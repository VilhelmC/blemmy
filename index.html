<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="description" content="Blemmy — content-first documents and precision layout" />

	<title>Blemmy</title>
	<meta property="og:type" content="website" />

	<!-- Fonts are bundled locally via @fontsource (see src/styles/fonts.css). -->

	<!--
		Dark mode: runs synchronously before first paint to prevent
		flash-of-light-mode. Must be inline here (not deferred).
	-->
	<script>
		(function () {
			document.documentElement.classList.add('blemmy-booting');
			const stored = localStorage.getItem('theme');
			const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
			if (stored === 'dark' || (!stored && prefersDark)) {
				document.documentElement.classList.add('dark');
			}
			// Force print-surface on initial paint (web view toggle hidden for now)
			const q = new URLSearchParams(location.search);
			document.documentElement.classList.add('blemmy-print-surface');
			var path = window.location.pathname || '';
			var isPortfolioEmbed = q.get('blemmy-portfolio') === '1';
			var isPdfEmbed = q.get('blemmy-embed') === '1';
			var isPublishedEmbed = /\/embed\/[^/]+/.test(path) || q.has('blemmy-embed-share');
			if (isPdfEmbed) {
				document.documentElement.classList.add('blemmy-embed-pdf');
			}
			if (isPortfolioEmbed || isPublishedEmbed) {
				document.documentElement.classList.add('blemmy-portfolio-embed');
			}
			if (isPublishedEmbed) {
				document.documentElement.classList.add('blemmy-share-readonly');
				document.documentElement.classList.add('blemmy-published-embed');
			}
			// Share view: set initial scale before first paint to avoid
			// load-time overflow on narrow screens.
			(function () {
				var isSharePath = /\/share\/[^/]+/.test(path);
				var isShareQuery = q.has('blemmy-share');
				if (!isSharePath && !isShareQuery && !isPublishedEmbed && !isPortfolioEmbed) {
					return;
				}
				var base = Math.round((210 / 25.4) * 96);
				var vw = (window.visualViewport && window.visualViewport.width)
					? window.visualViewport.width
					: window.innerWidth;
				var available = Math.max(Math.floor(vw) - 12, 1);
				var scale = Math.min(1, available / base);
				document.documentElement.style
					.setProperty('--blemmy-share-scale', String(scale));
			})();
			// OAuth return in named popup (GitHub / Google): see OAUTH_POPUP_NAME_PREFIX in blemmy-cloud.ts.
			(function () {
				var prefix = 'blemmy-oauth-';
				if (typeof window.name !== 'string' || window.name.substring(0, prefix.length) !== prefix) {
					return;
				}
				var sp = new URLSearchParams(window.location.search);
				var code = sp.get('code');
				var isCallback = (code && code.length >= 10)
					|| sp.has('error')
					|| sp.has('error_description');
				if (!isCallback) {
					return;
				}
				var html = document.documentElement;
				html.classList.remove('blemmy-booting');
				html.classList.add('blemmy-oauth-popup-shell');
				document.title = 'Sign in';
			})();
		})();
	</script>
	<style>
		html.blemmy-booting, html.blemmy-booting body {
			background: #f5f4ef;
			margin: 0;
			min-height: 100%;
		}
		html.dark.blemmy-booting, html.dark.blemmy-booting body {
			background: #111;
		}
		html.blemmy-booting #blemmy-doc-root {
			visibility: hidden;
		}
		/*
		 * Prevent occasional unstyled flash: keep root hidden until CSS modules
		 * have loaded and main.ts marks the document as ready.
		 */
		html:not(.blemmy-css-ready) #blemmy-doc-root {
			visibility: hidden;
		}
		#blemmy-boot-splash {
			position: fixed;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			flex-direction: column;
			gap: 0.6rem;
			font-family: 'DM Sans', sans-serif;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: #5c5c5c;
			background: transparent;
			z-index: 9999;
		}
		html.dark #blemmy-boot-splash {
			color: #a8a8a8;
		}
		#blemmy-boot-splash[hidden] {
			display: none !important;
		}
		/* OAuth callback popup: splash hidden before paint (class from head script). */
		html.blemmy-oauth-popup-shell #blemmy-boot-splash {
			display: none !important;
		}
		html.blemmy-oauth-popup-shell,
		html.blemmy-oauth-popup-shell body {
			margin: 0;
			min-height: 100%;
			background: #f5f4ef;
		}
		html.dark.blemmy-oauth-popup-shell,
		html.dark.blemmy-oauth-popup-shell body {
			background: #111;
		}
		.blemmy-boot-splash__dot {
			width: 0.5rem;
			height: 0.5rem;
			border-radius: 999px;
			background: currentColor;
			opacity: 0.55;
			animation: cvBootPulse 1s ease-in-out infinite;
		}
		@keyframes cvBootPulse {
			0%, 100% { transform: scale(0.8); opacity: 0.35; }
			50% { transform: scale(1); opacity: 0.9; }
		}
	</style>
</head>
<body>
	<div id="blemmy-boot-splash" aria-live="polite">
		<div class="blemmy-boot-splash__dot"></div>
		<div>Preparing document layout</div>
	</div>
	<!--
		Everything is rendered by src/main.ts.
		Body is intentionally empty — no flash of unstyled content
		because the dark-mode and print-surface classes are set above.
	-->
	<script type="module" src="/src/main.ts"></script>
</body>
</html>
